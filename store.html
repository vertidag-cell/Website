<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Store — Arkoris</title>
    <meta name="description" content="Shop for your Discord server, powered by Arkoris." />
    <meta name="robots" content="noindex" />
    <meta property="og:title" content="Store — Arkoris" />
    <meta property="og:type" content="website" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/png" href="assets/logo.png?v=2" />
    <link rel="stylesheet" href="styles.css?v=57" />
    <link rel="stylesheet" href="lx-site.css?v=1" />
    <style>
      :root { --accent: var(--red, #2bff9e); }
      .store-wrap { max-width: 1040px; margin: 0 auto; padding: 28px 20px 80px; }

      .store-hero {
        position: relative; border: 1px solid var(--border); border-radius: var(--radius-lg, 20px);
        background: radial-gradient(700px 260px at 50% -50px, color-mix(in srgb, var(--accent) 20%, transparent), transparent 70%), var(--card, rgba(255,255,255,0.06));
        overflow: hidden; margin-bottom: 26px;
      }
      .store-hero-banner { width: 100%; height: 180px; object-fit: cover; display: block; opacity: .9; }
      .store-hero-inner { display: flex; align-items: center; gap: 16px; padding: 22px 26px; }
      .store-logo { width: 64px; height: 64px; border-radius: 16px; object-fit: cover; flex: none;
        border: 1px solid var(--border-strong, rgba(255,255,255,0.16)); box-shadow: 0 10px 36px color-mix(in srgb, var(--accent) 28%, transparent); }
      .store-logo.store-fb { display: grid; place-items: center; font-weight: 800; font-size: 26px; color: var(--text);
        background: color-mix(in srgb, var(--accent) 22%, rgba(255,255,255,0.06)); }
      .store-htext { min-width: 0; }
      .store-title { font-size: clamp(22px, 4vw, 34px); font-weight: 900; letter-spacing: -0.02em; margin: 0 0 4px; }
      .store-desc { color: var(--text-muted, #a1a1aa); font-size: 14.5px; margin: 0; }
      .store-pays { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
      .store-pay { font-size: 12px; font-weight: 600; color: var(--text-muted, #a1a1aa); border: 1px solid var(--border); border-radius: 999px; padding: 4px 11px; }

      .store-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
      .prod { display: flex; flex-direction: column; border: 1px solid var(--border); border-radius: 16px; overflow: hidden;
        background: var(--card, rgba(255,255,255,0.05)); transition: border-color .15s, transform .15s; }
      .prod:hover { border-color: var(--border-strong, rgba(255,255,255,0.18)); transform: translateY(-2px); }
      .prod-img { width: 100%; aspect-ratio: 16 / 10; object-fit: cover; background: #15151c; display: block; }
      .prod-img.prod-fb { display: grid; place-items: center; font-weight: 800; font-size: 30px; color: var(--text-dim, #71717a);
        background: color-mix(in srgb, var(--accent) 10%, rgba(255,255,255,0.04)); }
      .prod-body { padding: 14px 15px 15px; display: flex; flex-direction: column; gap: 7px; flex: 1; }
      .prod-cat { font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--accent); }
      .prod-name { font-weight: 800; font-size: 16px; margin: 0; }
      .prod-desc { color: var(--text-muted, #a1a1aa); font-size: 13px; margin: 0; line-height: 1.45;
        display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
      .prod-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 2px; }
      .prod-badge { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 999px;
        border: 1px solid var(--border); color: var(--text-muted, #a1a1aa); }
      .prod-badge.role { color: var(--accent); border-color: color-mix(in srgb, var(--accent) 40%, transparent); background: color-mix(in srgb, var(--accent) 10%, transparent); }
      .prod-badge.oos { color: #f59e0b; border-color: rgba(245,158,11,.4); }
      .prod-foot { margin-top: auto; padding-top: 10px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
      .prod-price { display: flex; flex-direction: column; line-height: 1.2; }
      .prod-money { font-weight: 900; font-size: 18px; }
      .prod-credits { font-size: 12.5px; color: var(--text-muted, #a1a1aa); font-weight: 700; }
      .prod-or { font-size: 11px; color: var(--text-dim, #71717a); }
      .prod-btn { white-space: nowrap; }

      .store-state { text-align: center; padding: 56px 28px; border: 1px solid var(--border); border-radius: var(--radius-lg, 20px);
        background: radial-gradient(520px 200px at 50% -24px, color-mix(in srgb, var(--accent) 13%, transparent), transparent 70%), var(--card, rgba(255,255,255,0.04)); }
      .store-state-ico { width: 60px; height: 60px; margin: 0 auto 18px; display: grid; place-items: center; border-radius: 18px;
        color: var(--accent); background: color-mix(in srgb, var(--accent) 12%, transparent); border: 1px solid color-mix(in srgb, var(--accent) 28%, transparent); }
      .store-state-ico svg { width: 28px; height: 28px; }
      .store-state h2 { font-size: 22px; margin: 0 0 10px; }
      .store-state p { color: var(--text-muted, #a1a1aa); max-width: 460px; margin: 0 auto 22px; line-height: 1.55; }
      .store-badge { display: inline-flex; align-items: center; gap: 7px; font-size: 12px; font-weight: 700; letter-spacing: .08em;
        text-transform: uppercase; color: var(--accent); border: 1px solid color-mix(in srgb, var(--accent) 45%, transparent);
        background: color-mix(in srgb, var(--accent) 12%, transparent); padding: 5px 12px; border-radius: 999px; margin-bottom: 16px; }
      .store-note { margin: -8px 0 22px; text-align: center; font-size: 13px; color: var(--text-dim, #71717a); }
      .store-foot { text-align: center; color: var(--text-dim, #71717a); font-size: 13px; margin-top: 28px; }
      .store-foot a { color: var(--text-muted, #a1a1aa); }
      .skel { background: linear-gradient(90deg, rgba(255,255,255,0.05), rgba(255,255,255,0.1), rgba(255,255,255,0.05));
        background-size: 200% 100%; animation: shimmer 1.3s infinite; border-radius: 16px; }
      @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

      /* Floating cart button */
      .cart-fab { position: fixed; right: 20px; bottom: 20px; z-index: 50; display: inline-flex; align-items: center; gap: 8px;
        padding: 12px 18px; border-radius: 999px; border: 1px solid color-mix(in srgb, var(--accent) 45%, transparent);
        background: var(--accent); color: #06120c; font-weight: 800; font-size: 14px; cursor: pointer;
        box-shadow: 0 12px 34px color-mix(in srgb, var(--accent) 40%, transparent); }
      .cart-fab svg { width: 18px; height: 18px; }
      .cart-fab .cart-count { background: #0b0f1a; color: #fff; border-radius: 999px; padding: 1px 8px; font-size: 12px; }

      /* Cart / orders modal */
      .cart-overlay { position: fixed; inset: 0; z-index: 60; background: rgba(0,0,0,0.55); backdrop-filter: blur(3px);
        display: flex; justify-content: flex-end; }
      .cart-panel { width: min(440px, 100%); height: 100%; overflow-y: auto; background: var(--bg, #0b0f1a);
        border-left: 1px solid var(--border); padding: 22px 20px 30px; animation: slideIn .2s ease; }
      @keyframes slideIn { from { transform: translateX(24px); opacity: .6; } to { transform: none; opacity: 1; } }
      .cart-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
      .cart-head h2 { margin: 0; font-size: 20px; font-weight: 900; }
      .cart-head-actions { display: flex; align-items: center; gap: 12px; }
      .cart-link { background: none; border: none; color: var(--accent); font-weight: 700; font-size: 13px; cursor: pointer; }
      .cart-x { background: none; border: none; color: var(--text-muted, #a1a1aa); font-size: 18px; cursor: pointer; line-height: 1; }
      .cart-empty { color: var(--text-muted, #a1a1aa); text-align: center; padding: 40px 0; }
      .cart-lines { list-style: none; margin: 0 0 18px; padding: 0; display: flex; flex-direction: column; gap: 10px; }
      .cart-line { border: 1px solid var(--border); border-radius: 12px; padding: 11px 13px; }
      .cart-line.bad { border-color: rgba(245,158,11,0.5); }
      .cart-line-main { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
      .cart-line-name { font-weight: 700; font-size: 14px; flex: 1; min-width: 0; }
      .cart-line-price { font-size: 13px; color: var(--text-muted, #a1a1aa); font-weight: 700; }
      .cart-issue { font-size: 11px; color: #f59e0b; border: 1px solid rgba(245,158,11,0.4); border-radius: 999px; padding: 1px 7px; }
      .cart-qty { display: flex; align-items: center; gap: 8px; }
      .qbtn { width: 28px; height: 28px; border-radius: 8px; border: 1px solid var(--border); background: var(--card, rgba(255,255,255,0.05));
        color: var(--text); font-weight: 800; cursor: pointer; font-size: 15px; line-height: 1; }
      .qbtn.rm { margin-left: auto; border-color: transparent; }
      .qn { min-width: 22px; text-align: center; font-weight: 800; }
      .cart-totals { border-top: 1px solid var(--border); padding-top: 14px; margin-bottom: 14px; display: flex; flex-direction: column; gap: 6px; }
      .cart-totals > div { display: flex; justify-content: space-between; font-size: 14px; }
      .cart-totals > div span { color: var(--text-muted, #a1a1aa); }
      .cart-bal { font-size: 12.5px !important; }
      .cart-rails { display: flex; flex-direction: column; gap: 10px; }
      .cart-rails .btn { width: 100%; justify-content: center; }
      .cart-warn { color: #f59e0b; font-size: 13px; text-align: center; margin: 0; }

      .order-list { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 9px; }
      .order-row { border: 1px solid var(--border); border-radius: 12px; padding: 11px 13px; }
      .order-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; font-size: 14px; }
      .order-items { color: var(--text-muted, #a1a1aa); font-size: 12.5px; margin-top: 5px; }

      .store-toast { position: fixed; left: 50%; bottom: 26px; transform: translate(-50%, 16px); z-index: 80; opacity: 0;
        background: #14181f; color: #fff; border: 1px solid var(--border-strong, rgba(255,255,255,0.16)); border-radius: 12px;
        padding: 11px 18px; font-weight: 700; font-size: 14px; box-shadow: 0 16px 40px rgba(0,0,0,0.5); transition: opacity .22s, transform .22s; }
      .store-toast.in { opacity: 1; transform: translate(-50%, 0); }
      .store-toast.err { border-color: rgba(239,68,68,0.5); }
    </style>
  </head>
  <body>
    <header class="navbar">
      <div class="container nav-inner">
        <a class="brand" href="index.html">
          <span class="brand-mark" aria-hidden="true"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M12 2L20 5v7c0 4.5-3.5 8.5-8 9-4.5-.5-8-4.5-8-9V5l8-3z" fill="rgba(255,255,255,0.16)" stroke="rgba(255,255,255,0.55)" stroke-width="0.9"/><path d="M13.2 6.5l-4.3 7h3l-1 4 4.3-7h-3l1-4z" fill="#fff"/></svg></span>
          <span class="brand-text"><span class="name">Arkoris</span><span class="sub">Discord Automation · ARK</span></span>
        </a>
        <div class="nav-cta">
          <a class="btn btn-ghost nav-hide-sm" data-link="inviteBot" href="#">Invite Bot</a>
          <a class="btn btn-primary" data-link="subscribe" href="pricing.html">Get Premium</a>
        </div>
      </div>
    </header>

    <main>
      <div class="store-wrap">
        <div id="store-root">
          <div class="skel" style="height:140px;margin-bottom:24px"></div>
          <div class="store-grid">
            <div class="skel" style="height:280px"></div>
            <div class="skel" style="height:280px"></div>
            <div class="skel" style="height:280px"></div>
          </div>
        </div>
        <p class="store-foot">Powered by <a href="index.html">Arkoris</a> · Secure checkout for your Discord server</p>
      </div>
    </main>

    <script src="config.js"></script>
    <script src="store.js"></script>
  </body>
</html>
