<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Store — Arkoris</title>
    <meta name="description" content="Shop for your Discord server, powered by Arkoris." />
    <meta name="robots" content="noindex" />
    <meta property="og:title" content="Store — Arkoris" />
    <meta property="og:type" content="website" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/png" href="assets/logo.png?v=2" />
    <link rel="stylesheet" href="styles.css?v=57" />
    <link rel="stylesheet" href="lx-site.css?v=1" />
    <style>
      :root { --accent: var(--red, #2bff9e); --text-dim: #7c8f86; } /* lift dim text to >=AA on near-black (store-scoped) */
      /* Atmospheric storefront backdrop — a soft, brand-adaptive aurora over a
         deep gradient (uses each store's --accent), fixed while content scrolls.
         Gives the shop real depth instead of a flat near-black page. */
      body { background-color: #050608;
        background-image:
          radial-gradient(1150px 560px at 50% -240px, color-mix(in srgb, var(--accent) 15%, transparent), transparent 60%),
          radial-gradient(760px 520px at 110% -120px, color-mix(in srgb, var(--accent) 7%, transparent), transparent 55%),
          linear-gradient(180deg, #080a0e 0%, #050608 58%);
        background-attachment: fixed; }
      .store-wrap { max-width: 1040px; margin: 0 auto; padding: 28px 20px 80px; }

      .store-hero {
        position: relative; border: 1px solid var(--border); border-radius: var(--radius-lg, 20px);
        background: radial-gradient(700px 260px at 50% -50px, color-mix(in srgb, var(--accent) 20%, transparent), transparent 70%), var(--card, rgba(255,255,255,0.06));
        overflow: hidden; margin-bottom: 26px;
      }
      .store-hero-banner { width: 100%; height: 180px; object-fit: cover; display: block; opacity: .9; }
      .store-hero-inner { display: flex; align-items: center; gap: 16px; padding: 22px 26px; }
      .store-logo { width: 64px; height: 64px; border-radius: 16px; object-fit: cover; flex: none;
        border: 1px solid var(--border-strong, rgba(255,255,255,0.16)); box-shadow: 0 10px 36px color-mix(in srgb, var(--accent) 28%, transparent); }
      .store-logo.store-fb { display: grid; place-items: center; font-weight: 900; font-size: 26px; color: color-mix(in srgb, var(--accent) 72%, #fff);
        background: radial-gradient(120% 120% at 28% 18%, color-mix(in srgb, var(--accent) 30%, transparent), transparent 62%),
                    linear-gradient(135deg, rgba(255,255,255,.07), rgba(255,255,255,.02)); }
      .store-htext { min-width: 0; }
      .store-title { font-size: clamp(22px, 4vw, 34px); font-weight: 900; letter-spacing: -0.02em; margin: 0 0 4px; }
      .store-desc { color: var(--text-muted, #a1a1aa); font-size: 14.5px; margin: 0; }
      .store-pays { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
      .store-pay { font-size: 12px; font-weight: 600; color: var(--text-muted, #a1a1aa); border: 1px solid var(--border); border-radius: 999px; padding: 4px 11px; }
      .store-trust { display: flex; flex-wrap: wrap; gap: 8px; padding: 0 26px 20px; }
      .store-trust-pill { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 600; color: var(--text-muted, #a1a1aa);
        border: 1px solid var(--border); border-radius: 999px; padding: 5px 12px; background: color-mix(in srgb, var(--accent) 5%, transparent); }
      .store-trust-pill b { color: var(--text); font-weight: 800; }
      .store-trust-pill .stars { font-size: 12px; }

      .store-announce { display: flex; align-items: center; gap: 8px; padding: 12px 16px; margin-bottom: 22px; border-radius: 12px; font-size: 14px; font-weight: 600;
        color: var(--accent); border: 1px solid color-mix(in srgb, var(--accent) 40%, transparent); background: color-mix(in srgb, var(--accent) 10%, transparent); }
      .store-test { display: flex; align-items: center; gap: 8px; padding: 11px 16px; margin-bottom: 14px; border-radius: 12px; font-size: 13.5px; font-weight: 700;
        color: #fbbf24; border: 1px solid rgba(251,191,36,0.45); background: rgba(251,191,36,0.10); }

      /* Browse toolbar: search + sort + category chips */
      .store-tools { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
      .store-search { flex: 1; min-width: 200px; padding: 11px 14px; border-radius: 11px; border: 1px solid var(--border); background: var(--card, rgba(255,255,255,0.05)); color: var(--text); font: inherit; }
      .store-search:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 26%, transparent); }
      .store-search:not(:placeholder-shown) { border-color: color-mix(in srgb, var(--accent) 30%, transparent); }
      .store-sort { padding: 11px 14px; border-radius: 11px; border: 1px solid var(--border); background: var(--card, rgba(255,255,255,0.05)); color: var(--text); font: inherit; cursor: pointer; color-scheme: dark; }
      .store-sort option, .pm-rev-sort option { background: #11161c; color: #e6edf3; }
      .store-cats { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 18px; }
      .store-cat { padding: 7px 14px; border-radius: 999px; border: 1px solid var(--border); background: transparent; color: var(--text-muted, #a1a1aa); font: inherit; font-weight: 600; font-size: 13px; cursor: pointer; transition: background .15s, color .15s, border-color .15s; }
      .store-cat:hover { border-color: var(--border-strong, rgba(255,255,255,0.18)); color: var(--text); }
      .store-cat.on { background: var(--accent); color: #06120c; border-color: var(--accent); }
      .store-count { font-size: 12.5px; color: var(--text-muted, #a1a1aa); margin-bottom: 12px; font-weight: 600; }
      .store-more { text-align: center; margin-top: 24px; }

      .store-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
      .prod { display: flex; flex-direction: column; border: 1px solid color-mix(in srgb, var(--accent) 14%, rgba(255,255,255,0.10)); border-radius: 16px; overflow: hidden;
        background: linear-gradient(180deg, rgba(255,255,255,0.055), rgba(255,255,255,0.028));
        box-shadow: 0 1px 0 rgba(255,255,255,0.08) inset, 0 1px 2px rgba(0,0,0,0.6), 0 14px 30px -18px rgba(0,0,0,0.75);
        transition: border-color .18s ease, transform .18s ease, box-shadow .18s ease; }
      .prod:hover { border-color: color-mix(in srgb, var(--accent) 42%, transparent); transform: translateY(-3px);
        box-shadow: 0 1px 0 rgba(255,255,255,0.06) inset, 0 24px 50px -26px color-mix(in srgb, var(--accent) 30%, #000); }
      .prod-img { width: 100%; aspect-ratio: 16 / 10; object-fit: cover; background: #15151c; display: block; }
      .prod-img.prod-fb { display: grid; place-items: center; font-weight: 900; font-size: 34px; letter-spacing: -.02em;
        color: color-mix(in srgb, var(--accent) 70%, #fff);
        background: radial-gradient(120% 120% at 28% 18%, color-mix(in srgb, var(--accent) 24%, transparent), transparent 62%),
                    linear-gradient(135deg, rgba(255,255,255,.06), rgba(255,255,255,.015)); }
      .prod-body { padding: 14px 15px 15px; display: flex; flex-direction: column; gap: 7px; flex: 1; }
      .prod-cat { font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--accent); }
      .prod-name { font-weight: 800; font-size: 16px; margin: 0; }
      .prod-desc { color: var(--text-muted, #a1a1aa); font-size: 13px; margin: 0; line-height: 1.45;
        display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
      .prod-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 2px; }
      .prod-badge { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 999px;
        border: 1px solid var(--border); color: var(--text-muted, #a1a1aa); }
      .prod-badge.role { color: var(--accent); border-color: color-mix(in srgb, var(--accent) 40%, transparent); background: color-mix(in srgb, var(--accent) 10%, transparent); }
      .prod-badge.feat { color: #06120c; background: var(--accent); border-color: var(--accent); font-weight: 800; }
      .prod-badge.oos { color: #f59e0b; border-color: rgba(245,158,11,.4); }
      .prod-badge.low { color: #fb923c; border-color: rgba(251,146,60,.45); background: rgba(251,146,60,.08); }
      .prod-badge.incart { color: var(--accent); border-color: color-mix(in srgb, var(--accent) 45%, transparent); background: color-mix(in srgb, var(--accent) 12%, transparent); font-weight: 700; }
      .prod.is-feat { border-color: color-mix(in srgb, var(--accent) 45%, transparent); box-shadow: 0 0 0 1px color-mix(in srgb, var(--accent) 22%, transparent), 0 12px 32px color-mix(in srgb, var(--accent) 14%, transparent); }
      @keyframes prodUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
      .prod.reveal { animation: prodUp .45s cubic-bezier(.22,.61,.36,1) both; }
      /* Keyboard focus visibility */
      .prod:focus-visible, .store-cat:focus-visible, .pm-var:focus-visible, .star-pick:focus-visible,
      .btn:focus-visible, .qbtn:focus-visible, .pm-qd:focus-visible, .pm-x:focus-visible, .cart-fab:focus-visible {
        outline: 2px solid var(--accent); outline-offset: 2px; }
      .prod-foot { margin-top: auto; padding-top: 10px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
      .prod-price { display: flex; flex-direction: column; line-height: 1.2; }
      .prod-money { font-weight: 900; font-size: 18px; }
      .prod-credits { font-size: 12.5px; color: var(--text-muted, #a1a1aa); font-weight: 700; }
      .prod-or { font-size: 11px; color: var(--text-dim, #71717a); }
      .prod-was { font-size: 12.5px; color: var(--text-dim, #71717a); text-decoration: line-through; margin-left: 6px; font-weight: 600; }
      .prod-badge.sale { color: #06120c; background: #fb7185; border-color: #fb7185; font-weight: 800; }
      .prod-badge.best { color: #1a0f02; background: #fbbf24; border-color: #fbbf24; font-weight: 800; }
      .prod-badge.bundle { color: #2e1065; background: #c4b5fd; border-color: #c4b5fd; font-weight: 800; }
      .prod-bundle { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; margin: 2px 0 10px; }
      .prod-bundle-h { font-size: 11px; font-weight: 800; letter-spacing: .02em; color: #c4b5fd; text-transform: uppercase; }
      .prod-bundle-item { font-size: 12px; font-weight: 600; color: var(--text, #e4e4e7); padding: 2px 8px; border-radius: 999px; border: 1px solid color-mix(in srgb, #c4b5fd 35%, transparent); background: color-mix(in srgb, #c4b5fd 10%, transparent); }
      .prod-social { display: flex; align-items: center; gap: 7px 12px; flex-wrap: wrap; }
      .prod-sold { font-size: 12px; font-weight: 700; color: #fb923c; }
      .pm-sold { font-size: 13px; font-weight: 700; color: #fb923c; margin: 2px 0 4px; }
      .prod-sale-ends { font-size: 12px; font-weight: 700; color: #fb7185; margin: 2px 0 8px; }
      .prod-btn { white-space: nowrap; }

      .store-state { text-align: center; padding: 56px 28px; border: 1px solid var(--border); border-radius: var(--radius-lg, 20px);
        background: radial-gradient(520px 200px at 50% -24px, color-mix(in srgb, var(--accent) 13%, transparent), transparent 70%), var(--card, rgba(255,255,255,0.04)); }
      .store-state-ico { width: 60px; height: 60px; margin: 0 auto 18px; display: grid; place-items: center; border-radius: 18px;
        color: var(--accent); background: color-mix(in srgb, var(--accent) 12%, transparent); border: 1px solid color-mix(in srgb, var(--accent) 28%, transparent); }
      .store-state-ico svg { width: 28px; height: 28px; }
      .store-state h2 { font-size: 22px; margin: 0 0 10px; }
      .store-state p { color: var(--text-muted, #a1a1aa); max-width: 460px; margin: 0 auto 22px; line-height: 1.55; }
      .store-badge { display: inline-flex; align-items: center; gap: 7px; font-size: 12px; font-weight: 700; letter-spacing: .08em;
        text-transform: uppercase; color: var(--accent); border: 1px solid color-mix(in srgb, var(--accent) 45%, transparent);
        background: color-mix(in srgb, var(--accent) 12%, transparent); padding: 5px 12px; border-radius: 999px; margin-bottom: 16px; }
      .store-note { margin: -8px 0 22px; text-align: center; font-size: 13px; color: var(--text-dim, #71717a); }
      .store-foot { text-align: center; color: var(--text-dim, #71717a); font-size: 13px; margin-top: 28px; }
      .store-foot a { color: var(--text-muted, #a1a1aa); }
      .skel { background: linear-gradient(90deg, rgba(255,255,255,0.05), rgba(255,255,255,0.08), rgba(255,255,255,0.05));
        background-size: 200% 100%; animation: shimmer 1.3s infinite; border-radius: 16px; }
      @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

      /* Floating cart button */
      .cart-fab { position: fixed; right: 20px; bottom: 20px; z-index: 50; display: inline-flex; align-items: center; gap: 8px;
        padding: 12px 18px; border-radius: 999px; border: 1px solid color-mix(in srgb, var(--accent) 45%, transparent);
        background: var(--accent); color: #06120c; font-weight: 800; font-size: 14px; cursor: pointer;
        box-shadow: 0 12px 34px color-mix(in srgb, var(--accent) 40%, transparent); }
      .cart-fab svg { width: 18px; height: 18px; }
      .cart-fab .cart-count { background: #0b0f1a; color: #fff; border-radius: 999px; padding: 1px 8px; font-size: 12px; }
      @keyframes cartBump { 0% { transform: scale(1); } 30% { transform: scale(1.12); } 100% { transform: scale(1); } }
      .cart-fab.bump { animation: cartBump .35s ease; }

      /* Cart / orders modal */
      .cart-overlay { position: fixed; inset: 0; z-index: 60; background: rgba(0,0,0,0.55); backdrop-filter: blur(3px);
        display: flex; justify-content: flex-end; }
      .cart-panel { width: min(440px, 100%); height: 100%; overflow-y: auto;
        background: linear-gradient(180deg, rgba(255,255,255,0.035), rgba(255,255,255,0) 220px), var(--bg-elev, #0b0f1a);
        border-left: 1px solid rgba(255,255,255,0.10); box-shadow: -30px 0 70px -24px rgba(0,0,0,0.7); padding: 22px 20px 30px; animation: slideIn .2s ease; }
      @keyframes slideIn { from { transform: translateX(24px); opacity: .6; } to { transform: none; opacity: 1; } }
      /* Checkout details dialog (delivery fields) — centered card. */
      .checkout-overlay { justify-content: center; align-items: center; padding: 20px; }
      .checkout-panel { width: min(440px, 100%); max-height: 90vh; overflow-y: auto;
        background: linear-gradient(180deg, rgba(255,255,255,0.045), rgba(255,255,255,0) 200px), var(--bg-elev, #0b0f1a);
        border: 1px solid rgba(255,255,255,0.10); border-radius: 18px; box-shadow: 0 32px 80px -28px rgba(0,0,0,0.85); padding: 22px 22px 24px; animation: popIn .2s ease; }
      @keyframes popIn { from { transform: scale(.96); opacity: .4; } to { transform: none; opacity: 1; } }
      .co-intro { color: var(--text-muted, #a1a1aa); font-size: 13px; margin: 0 0 16px; }
      .co-fields { display: flex; flex-direction: column; gap: 13px; margin-bottom: 16px; }
      .co-field { display: flex; flex-direction: column; gap: 6px; }
      .co-label { font-size: 12.5px; font-weight: 700; color: var(--text, #e4e4e7); }
      .co-req { color: var(--accent); font-style: normal; }
      .co-input { width: 100%; box-sizing: border-box; padding: 10px 12px; border-radius: 10px; font-size: 14px;
        border: 1px solid var(--border); background: var(--surface, #11161f); color: var(--text, #e4e4e7); }
      .co-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 22%, transparent); }
      .co-err { color: #f87171; font-size: 13px; margin-bottom: 12px; font-weight: 600; }
      .co-submit { width: 100%; }
      .order-cf-row { display: flex; flex-wrap: wrap; gap: 6px 14px; margin-top: 8px; }
      .order-cf { font-size: 12px; color: var(--text-muted, #a1a1aa); }
      .order-cf b { color: var(--text, #e4e4e7); font-weight: 700; }
      .cart-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
      .cart-head h2 { margin: 0; font-size: 20px; font-weight: 900; }
      .cart-head-actions { display: flex; align-items: center; gap: 12px; }
      .cart-link { background: none; border: none; color: var(--accent); font-weight: 700; font-size: 13px; cursor: pointer; }
      .cart-x { background: none; border: none; color: var(--text-muted, #a1a1aa); font-size: 18px; cursor: pointer; line-height: 1; }
      .cart-empty { color: var(--text-muted, #a1a1aa); text-align: center; padding: 40px 0; }
      .cart-empty-state { text-align: center; padding: 48px 16px; }
      .cart-empty-ico { width: 52px; height: 52px; margin: 0 auto 16px; display: grid; place-items: center; border-radius: 16px; color: var(--accent); background: color-mix(in srgb, var(--accent) 12%, transparent); }
      .cart-empty-ico svg { width: 24px; height: 24px; }
      .cart-empty-state p { color: var(--text-muted, #a1a1aa); margin: 0 0 18px; }
      .cart-lines { list-style: none; margin: 0 0 18px; padding: 0; display: flex; flex-direction: column; gap: 10px; }
      .cart-line { display: flex; align-items: flex-start; gap: 11px; border: 1px solid var(--border); border-radius: 12px; padding: 11px 12px; }
      .cart-line.bad { border-color: rgba(245,158,11,0.5); }
      .cart-thumb { width: 46px; height: 46px; border-radius: 9px; object-fit: cover; flex: none; background: #15151c; }
      .cart-thumb.cart-thumb-fb { display: grid; place-items: center; font-weight: 900; font-size: 18px; color: color-mix(in srgb, var(--accent) 70%, #fff);
        background: radial-gradient(120% 120% at 28% 18%, color-mix(in srgb, var(--accent) 22%, transparent), transparent 62%),
                    linear-gradient(135deg, rgba(255,255,255,.06), rgba(255,255,255,.015)); }
      .cart-line-info { flex: 1; min-width: 0; }
      .cart-line-top { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
      .cart-line-name { font-weight: 700; font-size: 14px; }
      .cart-line-unit { font-size: 12px; color: var(--text-dim, #71717a); margin-top: 2px; }
      .cart-line-price { font-size: 13.5px; color: var(--text); font-weight: 800; flex: none; white-space: nowrap; }
      .cart-qty { margin-top: 8px; }
      .cart-issue { font-size: 11px; color: #f59e0b; border: 1px solid rgba(245,158,11,0.4); border-radius: 999px; padding: 1px 7px; }
      .cart-qty { display: flex; align-items: center; gap: 8px; }
      .qbtn { width: 28px; height: 28px; border-radius: 8px; border: 1px solid var(--border); background: var(--card, rgba(255,255,255,0.05));
        color: var(--text); font-weight: 800; cursor: pointer; font-size: 15px; line-height: 1; }
      .qbtn.rm { margin-left: auto; border-color: transparent; }
      .qn { min-width: 22px; text-align: center; font-weight: 800; }
      .cart-clear-wrap { text-align: right; margin: -8px 0 14px; }
      .cart-clear { color: var(--text-dim, #71717a) !important; font-size: 12px; }
      .cart-clear:hover { color: #fda4a4 !important; }
      .cart-totals { border-top: 1px solid var(--border); padding-top: 14px; margin-bottom: 14px; display: flex; flex-direction: column; gap: 6px; }
      .cart-totals > div { display: flex; justify-content: space-between; font-size: 14px; }
      .cart-totals > div span { color: var(--text-muted, #a1a1aa); }
      .cart-bal { font-size: 12.5px !important; }
      .cart-promo { margin-bottom: 14px; }
      .cart-promo-input { width: 60%; padding: 9px 11px; border-radius: 9px; border: 1px solid var(--border); background: var(--card, rgba(255,255,255,0.05)); color: var(--text); font: inherit; text-transform: uppercase; }
      .cart-promo-apply { margin-left: 6px; padding: 9px 14px; border-radius: 9px; border: 1px solid var(--border-strong, rgba(255,255,255,0.16)); background: var(--card, rgba(255,255,255,0.06)); color: var(--text); font-weight: 700; cursor: pointer; }
      .cart-promo-applied { display: flex; align-items: center; gap: 8px; font-size: 14px; color: var(--accent); font-weight: 700; }
      .cart-promo-x { background: none; border: none; color: var(--text-dim, #71717a); font-size: 12px; cursor: pointer; text-decoration: underline; }
      .cart-promo-msg { font-size: 12.5px; color: #f59e0b; margin-top: 6px; min-height: 1px; }
      .cart-rails { display: flex; flex-direction: column; gap: 10px; }
      .cart-rails .btn { width: 100%; justify-content: center; }
      .cart-warn { color: #f59e0b; font-size: 13px; text-align: center; margin: 0; }

      .order-list { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 9px; }
      .order-row { border: 1px solid var(--border); border-radius: 12px; padding: 11px 13px; }
      .order-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; font-size: 14px; }
      .order-items { color: var(--text-muted, #a1a1aa); font-size: 12.5px; margin-top: 7px; display: flex; flex-direction: column; gap: 5px; }
      .order-item { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
      .order-review { background: none; border: 1px solid color-mix(in srgb, var(--accent) 40%, transparent); color: var(--accent); border-radius: 999px; padding: 2px 10px; font-size: 11.5px; font-weight: 700; cursor: pointer; white-space: nowrap; }
      .order-review:hover { background: color-mix(in srgb, var(--accent) 12%, transparent); }
      .order-date { color: var(--text-dim, #71717a); font-size: 11.5px; margin-top: 6px; }

      /* Star ratings */
      .stars { display: inline-flex; gap: 1px; letter-spacing: 1px; }
      .stars .star { color: var(--border-strong, rgba(255,255,255,0.2)); font-size: 14px; line-height: 1; }
      .stars .star.on { color: #f5b301; }
      .prod-rating { display: flex; align-items: center; gap: 7px; }

      /* Product detail modal */
      .pm-overlay { position: fixed; inset: 0; z-index: 70; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); display: flex; align-items: flex-start; justify-content: center; overflow-y: auto; padding: 40px 16px; }
      .pm-panel { position: relative; width: min(560px, 100%);
        background: linear-gradient(180deg, rgba(255,255,255,0.045), rgba(255,255,255,0) 220px), var(--bg-elev, #0b0f1a);
        border: 1px solid rgba(255,255,255,0.12); border-radius: 18px; box-shadow: 0 36px 90px -30px rgba(0,0,0,0.88); overflow: hidden; animation: slideIn .2s ease; }
      .pm-x { position: absolute; top: 12px; right: 12px; z-index: 2; width: 32px; height: 32px; border-radius: 50%; border: none; background: rgba(0,0,0,0.5); color: #fff; font-size: 15px; cursor: pointer; }

      .pm-prev { left: 16px; } .pm-next { right: 16px; }

      @media (max-width: 720px) { .pm-nav { display: none !important; } }
      .pm-img { width: 100%; aspect-ratio: 16 / 9; object-fit: cover; display: block; background: #15151c; }
      .pm-body { padding: 20px 22px 24px; }
      .pm-name { font-size: 22px; font-weight: 900; margin: 4px 0 8px; letter-spacing: -0.01em; }
      .pm-rating { min-height: 18px; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
      .pm-norate { color: var(--text-dim, #71717a); font-size: 12.5px; }
      .pm-rating-link { cursor: pointer; } .pm-rating-link:hover .prod-rating-n { text-decoration: underline; }
      .pm-desc { color: var(--text-muted, #a1a1aa); font-size: 14px; line-height: 1.55; margin: 0 0 12px; white-space: pre-wrap; }
      .pm-variants { margin: 14px 0 4px; }
      .pm-var-label { font-size: 12px; font-weight: 700; color: var(--text-muted, #a1a1aa); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 8px; }
      .pm-var-opts { display: flex; flex-wrap: wrap; gap: 8px; }
      .pm-var { padding: 9px 14px; border-radius: 10px; border: 1px solid var(--border); background: var(--card, rgba(255,255,255,0.05)); color: var(--text); font: inherit; font-weight: 600; font-size: 13.5px; cursor: pointer; transition: border-color .15s, background .15s; }
      .pm-var:hover:not(:disabled) { border-color: var(--border-strong, rgba(255,255,255,0.18)); }
      .pm-var.on { border-color: var(--accent); background: color-mix(in srgb, var(--accent) 14%, transparent); color: var(--accent); }
      .pm-var:disabled { opacity: .45; cursor: not-allowed; text-decoration: line-through; }
      /* Category picker: each product/tier is a full-width selectable row. */
      .pm-prows { display: flex; flex-direction: column; gap: 10px; margin: 4px 0 6px; }
      .pm-prow { position: relative; display: flex; align-items: center; gap: 12px; width: 100%; text-align: left;
        padding: 13px 15px; border-radius: 12px; border: 1px solid var(--border); background: var(--card, rgba(255,255,255,0.05));
        color: var(--text); font: inherit; cursor: pointer; transition: border-color .15s, background .15s; }
      .pm-prow:hover:not(:disabled) { border-color: var(--border-strong, rgba(255,255,255,0.18)); }
      .pm-prow.on { border-color: var(--accent); background: color-mix(in srgb, var(--accent) 12%, transparent); }
      .pm-prow.oos, .pm-prow:disabled { opacity: .5; cursor: not-allowed; }
      .pm-prow-info { display: flex; flex-direction: column; gap: 3px; flex: 1; min-width: 0; }
      .pm-prow-title { font-weight: 800; font-size: 15px; letter-spacing: -0.01em; }
      .pm-prow-sub { font-size: 12.5px; color: var(--text-muted, #a1a1aa); line-height: 1.4; white-space: pre-wrap; }

      .pm-prow-price { flex-shrink: 0; font-weight: 800; font-size: 14px; padding: 5px 10px; border-radius: 8px; background: rgba(255,255,255,0.05); white-space: nowrap; }
      .pm-prow-price .prod-was { margin-left: 6px; font-weight: 600; opacity: .6; }
      .pm-prow-check { flex-shrink: 0; width: 22px; height: 22px; border-radius: 50%; display: grid; place-items: center;
        background: var(--accent); color: #0b0f1a; font-size: 13px; font-weight: 900; opacity: 0; transform: scale(.6); transition: opacity .15s, transform .15s; }
      .pm-prow.on .pm-prow-check { opacity: 1; transform: scale(1); }
      .pm-stock { font-size: 12.5px; color: #fb923c; margin: 8px 0 0; min-height: 1px; }
      .pm-actions { display: flex; align-items: center; gap: 10px; }
      .pm-qty { display: inline-flex; align-items: center; gap: 2px; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
      .pm-qd { width: 32px; height: 36px; border: none; background: var(--card, rgba(255,255,255,0.05)); color: var(--text); font-size: 17px; font-weight: 800; cursor: pointer; line-height: 1; }
      .pm-qd:hover { background: color-mix(in srgb, var(--accent) 14%, transparent); }
      .pm-qty #pm-qn { min-width: 30px; text-align: center; font-weight: 800; }
      .pm-buy { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 14px 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); margin: 6px 0 4px; flex-wrap: wrap; }
      .pm-reviews { margin-top: 18px; }
      .pm-rev-title { font-size: 15px; font-weight: 800; margin: 0 0 12px; }
      /* Cross-sell row */
      .pm-related { margin-top: 22px; border-top: 1px solid var(--border); padding-top: 18px; }
      .pm-rel-title { font-size: 15px; font-weight: 800; margin: 0 0 12px; }
      .pm-rel-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .pm-rel-card { position: relative; display: flex; align-items: center; gap: 10px; padding: 8px; text-align: left; cursor: pointer;
        border: 1px solid var(--border); border-radius: 12px; background: var(--card, rgba(255,255,255,0.03)); transition: border-color .15s, transform .15s; }
      .pm-rel-card:hover { border-color: var(--accent); transform: translateY(-2px); }
      .pm-rel-img { width: 46px; height: 46px; flex: none; border-radius: 9px; object-fit: cover; }
      .pm-rel-fb { display: grid; place-items: center; font-weight: 900; color: color-mix(in srgb, var(--accent) 70%, #fff);
        background: radial-gradient(120% 120% at 28% 18%, color-mix(in srgb, var(--accent) 22%, transparent), transparent 62%),
                    linear-gradient(135deg, rgba(255,255,255,.06), rgba(255,255,255,.015)); }
      .pm-rel-info { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
      .pm-rel-name { font-size: 13px; font-weight: 700; color: var(--text, #e4e4e7); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .pm-rel-price { font-size: 12.5px; }
      .pm-rel-price .prod-money { font-size: 13px; }
      .pm-rel-tag { position: absolute; top: 6px; right: 6px; font-size: 10px; font-weight: 800; padding: 1px 6px; border-radius: 999px; }
      .pm-rel-tag.sale { color: #06120c; background: #fb7185; }
      .pm-rel-tag.best { background: transparent; font-size: 13px; padding: 0; }
      @media (max-width: 420px) { .pm-rel-grid { grid-template-columns: 1fr; } }
      .pm-rev-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 12px; }
      .pm-rev-head .pm-rev-title { margin: 0; }
      .pm-rev-sort { padding: 5px 9px; border-radius: 8px; border: 1px solid var(--border); background: var(--card, rgba(255,255,255,0.05)); color: var(--text); font: inherit; font-size: 12.5px; cursor: pointer; }
      .pm-rev-load, .pm-rev-empty, .pm-rev-cta { color: var(--text-muted, #a1a1aa); font-size: 13px; }
      .pm-rev-list { list-style: none; margin: 14px 0 0; padding: 0; display: flex; flex-direction: column; gap: 12px; }
      .pm-rev { border: 1px solid var(--border); border-radius: 12px; padding: 11px 13px; }
      .pm-rev-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; font-size: 13.5px; }
      .pm-rev-who { display: inline-flex; align-items: center; gap: 8px; min-width: 0; }
      .pm-verified { font-size: 10.5px; font-weight: 700; color: var(--accent); border: 1px solid color-mix(in srgb, var(--accent) 40%, transparent); border-radius: 999px; padding: 1px 7px; white-space: nowrap; }
      .pm-rev-date { font-size: 11px; color: var(--text-dim, #71717a); margin-top: 3px; }
      .pm-rev p { margin: 6px 0 0; font-size: 13px; color: var(--text-muted, #a1a1aa); line-height: 1.5; white-space: pre-wrap; }
      .pm-rev-reply { margin: 8px 0 0; padding: 8px 11px; font-size: 12.5px; line-height: 1.5; color: var(--text-muted, #a1a1aa); border-left: 2px solid color-mix(in srgb, var(--accent) 50%, transparent); background: color-mix(in srgb, var(--accent) 6%, transparent); border-radius: 0 8px 8px 0; }
      .pm-rev-reply b { color: var(--accent); }
      .pm-form-box { border: 1px solid var(--border-strong, rgba(255,255,255,0.16)); border-radius: 12px; padding: 14px; background: color-mix(in srgb, var(--accent) 5%, transparent); }
      .pm-form-h { font-weight: 800; font-size: 14px; margin-bottom: 10px; }
      .star-input { display: flex; gap: 4px; margin-bottom: 10px; }
      .star-pick { background: none; border: none; cursor: pointer; font-size: 26px; line-height: 1; color: var(--border-strong, rgba(255,255,255,0.25)); padding: 0; transition: color .12s, transform .12s; }
      .star-pick:hover { transform: scale(1.12); }
      .star-pick.on { color: #f5b301; }
      .pm-comment { width: 100%; min-height: 72px; resize: vertical; padding: 10px 12px; border-radius: 10px; border: 1px solid var(--border); background: var(--card, rgba(255,255,255,0.05)); color: var(--text); font: inherit; font-size: 13.5px; margin-bottom: 10px; }
      .pm-comment:focus { outline: none; border-color: var(--accent); }
      .pm-form-msg { font-size: 12.5px; color: #f59e0b; margin-top: 8px; min-height: 1px; }

      /* Store-wide reviews showcase ("What buyers say") at the bottom of the shop. */
      .store-reviews-showcase:empty { display: none; }
      .sr-wrap { margin: 48px 0 8px; padding-top: 32px; border-top: 1px solid var(--border); }
      .sr-head { display: flex; align-items: center; justify-content: space-between; gap: 14px; flex-wrap: wrap; margin-bottom: 18px; }
      .sr-title { font-size: 22px; font-weight: 900; letter-spacing: -0.01em; margin: 0; }
      .sr-overall { display: inline-flex; align-items: center; gap: 9px; }
      .sr-overall-n { font-size: 13px; color: var(--text-muted, #a1a1aa); font-weight: 600; }
      .sr-overall-n b { color: var(--text); font-weight: 800; }
      .sr-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
      .sr-card { display: flex; flex-direction: column; gap: 10px; margin: 0; padding: 16px 17px; border: 1px solid var(--border); border-radius: 14px;
        background: linear-gradient(180deg, color-mix(in srgb, var(--accent) 5%, transparent), transparent 60%), var(--card, rgba(255,255,255,0.04)); }
      .sr-stars { font-size: 14px; line-height: 1; }
      .sr-quote { margin: 0; font-size: 14px; line-height: 1.55; color: var(--text); flex: 1; }
      .sr-quote.sr-noquote { color: var(--text-muted, #a1a1aa); font-style: italic; }
      .sr-by { display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap; font-size: 12.5px; }
      .sr-who { display: inline-flex; align-items: center; gap: 7px; min-width: 0; }
      .sr-who b { font-weight: 800; }
      .sr-verified { font-size: 10px; font-weight: 700; color: var(--accent); border: 1px solid color-mix(in srgb, var(--accent) 40%, transparent); border-radius: 999px; padding: 1px 7px; white-space: nowrap; }
      .sr-prod { font-size: 11.5px; color: var(--text-dim, #71717a); font-weight: 600; }
      .sr-reply { margin-top: 2px; padding: 8px 11px; font-size: 12px; line-height: 1.5; color: var(--text-muted, #a1a1aa); border-left: 2px solid color-mix(in srgb, var(--accent) 50%, transparent); background: color-mix(in srgb, var(--accent) 6%, transparent); border-radius: 0 8px 8px 0; }
      .sr-reply b { color: var(--accent); }
      @media (max-width: 860px) { .sr-grid { grid-template-columns: repeat(2, 1fr); } }
      @media (max-width: 560px) { .sr-grid { grid-template-columns: 1fr; } .sr-wrap { margin-top: 36px; } }

      /* Price tags — a touch see-through so they sit back from the product name. */
      .prod-money, .prod-credits { opacity: 0.62; }
      /* Category tile meta (price range + item count) — a bit transparent. */
      .cat-tile .prod-meta { opacity: 0.6; }
      .cat-tile .prod-meta .prod-money { opacity: 1; } /* row opacity already dims it — no double-dim */

      /* Category page — big image on the left, pickable options on the right. */
      @keyframes catpRise { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }
      @keyframes catpMediaIn { from { opacity: 0; transform: translateY(14px) scale(.985); } to { opacity: 1; transform: none; } }
      .catp { animation: catpRise .3s ease both; }
      .catp-back { display: inline-flex; align-items: center; gap: 6px; margin-bottom: 18px; padding: 8px 15px; border-radius: 10px;
        border: 1px solid var(--border); background: var(--card, rgba(255,255,255,0.05)); color: var(--text-muted, #a1a1aa);
        font: inherit; font-weight: 700; font-size: 13.5px; cursor: pointer; transition: transform .18s, border-color .18s, color .18s; }
      .catp-back:hover { transform: translateX(-4px); border-color: var(--accent); color: var(--text); }
      .catp-grid { display: grid; grid-template-columns: minmax(0, 1.05fr) minmax(0, 1fr); gap: 34px; align-items: start; }
      .catp-media { position: sticky; top: 22px; border-radius: 20px; overflow: hidden; border: 1px solid var(--border);
        background: #12161d; box-shadow: 0 34px 80px -38px rgba(0,0,0,0.85); animation: catpMediaIn .5s cubic-bezier(.22,.61,.36,1) both; }
      .catp-img { width: 100%; aspect-ratio: 1 / 1; object-fit: cover; display: block; transition: transform .65s cubic-bezier(.22,.61,.36,1); }
      .catp-media:hover .catp-img { transform: scale(1.05); }
      .catp-img.catp-fb { display: grid; place-items: center; }
      .catp-panel { animation: catpRise .5s cubic-bezier(.22,.61,.36,1) .06s both; }
      .catp-name { font-size: 30px; font-weight: 900; letter-spacing: -0.02em; margin: 0 0 8px; line-height: 1.1; }
      .catp-desc { color: var(--text-muted, #a1a1aa); font-size: 15px; line-height: 1.6; margin: 0 0 22px; white-space: pre-wrap; }
      .catp-rows-label { font-size: 12px; font-weight: 700; color: var(--text-muted, #a1a1aa); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 11px; }
      .catp-rows { margin-bottom: 20px; }
      .catp-rows .pm-prow { opacity: 0; animation: catpRise .42s cubic-bezier(.22,.61,.36,1) both; transition: border-color .15s, background .15s, transform .15s; }
      .catp-rows .pm-prow:hover:not(:disabled) { transform: translateX(4px); }
      .catp-buy { display: flex; align-items: center; justify-content: space-between; gap: 14px; flex-wrap: wrap; margin-top: 6px; padding-top: 20px; border-top: 1px solid var(--border); }
      .catp-buy .prod-money, .catp-buy .prod-credits { opacity: 1; } /* the chosen price stays crisp */
      .catp-pwyw { align-items: center; border: 1px solid var(--accent); border-radius: 11px; overflow: hidden; background: var(--card, rgba(255,255,255,0.05)); }
      .catp-pwyw-cur { padding: 0 6px 0 12px; color: var(--text-muted, #a1a1aa); font-weight: 800; }
      .catp-pwyw input { width: 108px; padding: 11px 12px 11px 2px; border: none; background: transparent; color: var(--text); font: inherit; font-weight: 800; font-size: 15px; outline: none; }
      @media (max-width: 820px) {
        .catp-grid { grid-template-columns: 1fr; gap: 18px; }
        .catp-media { position: static; }
        .catp-img { aspect-ratio: 16 / 10; }
        .catp-name { font-size: 25px; }
      }

      .store-toast { position: fixed; left: 50%; bottom: 26px; transform: translate(-50%, 16px); z-index: 80; opacity: 0;
        background: #14181f; color: #fff; border: 1px solid var(--border-strong, rgba(255,255,255,0.16)); border-radius: 12px;
        padding: 11px 18px; font-weight: 700; font-size: 14px; box-shadow: 0 16px 40px rgba(0,0,0,0.5); transition: opacity .22s, transform .22s; }
      .store-toast.in { opacity: 1; transform: translate(-50%, 0); }
      .store-toast.err { border-color: rgba(239,68,68,0.5); }

      @media (max-width: 560px) {
        .store-wrap { padding: 16px 13px 76px; }
        .store-hero-inner { padding: 16px 18px; gap: 13px; }
        .store-logo { width: 50px; height: 50px; }
        .store-trust { padding: 0 18px 16px; }
        .store-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
        .prod-body { padding: 12px 12px 13px; }
        .prod-name { font-size: 14.5px; }
        /* Narrow cards can't fit price + button side-by-side — stack them so the
           "Add to cart" button is full-width and never truncates. */
        .prod-foot { flex-direction: column; align-items: stretch; gap: 8px; }
        .prod-btn { width: 100%; }
        .cart-fab { right: 14px; bottom: 14px; }
        .pm-overlay { padding: 0; }
        .pm-panel { width: 100%; min-height: 100vh; border-radius: 0; border: none; }
        .pm-buy { flex-direction: column; align-items: stretch; }
        .pm-actions { justify-content: space-between; }

      @media (prefers-reduced-motion: reduce) { .prod, .cart-panel, .pm-panel, .store-toast { transition: none !important; animation: none !important; } }

      /* ── Category nav icons + grouped browse sections ─────────────────────── */
      .store-cat { display: inline-flex; align-items: center; gap: 7px; }
      .store-cat-ico { width: 18px; height: 18px; border-radius: 5px; object-fit: cover; flex: none; }
      .store-cat.on .store-cat-ico { outline: 1px solid rgba(255,255,255,0.5); }
      .store-section { display: flex; align-items: center; gap: 14px; margin: 30px 0 16px; }
      .store-section:first-child { margin-top: 6px; }
      .store-sec-img { width: 52px; height: 52px; border-radius: 13px; object-fit: cover; flex: none;
        background: var(--bg-soft); border: 1px solid var(--border); }
      .store-sec-img.store-fb { display: grid; place-items: center; font-weight: 800; font-size: 20px;
        color: var(--accent);
        background: radial-gradient(120% 120% at 28% 18%, color-mix(in srgb, var(--accent) 22%, transparent), transparent 62%), var(--bg-elev); }
      .store-sec-text { flex: 1; min-width: 0; }
      .store-sec-title { margin: 0; font-size: 1.35rem; font-weight: 800; letter-spacing: -0.01em; color: var(--text); }
      .store-sec-desc { margin: 2px 0 0; font-size: 13px; color: var(--text-muted); }
      .store-sec-count { flex: none; font-size: 12.5px; font-weight: 600; color: var(--text-muted);
        padding: 4px 11px; border-radius: 999px; border: 1px solid var(--border); background: var(--card); }
      .store-subhead { display: flex; align-items: center; gap: 9px; margin: 18px 0 11px; padding-left: 2px; }
      .store-subhead-ico { width: 22px; height: 22px; border-radius: 6px; object-fit: cover; flex: none; }
      .store-subhead-name { font-size: 0.95rem; font-weight: 700; color: var(--text);
        position: relative; padding-left: 12px; }
      .store-subhead-name::before { content: "↳"; position: absolute; left: 0; color: var(--text-dim); font-weight: 600; }
      .store-subhead-n { font-size: 11.5px; font-weight: 700; color: var(--text-muted);
        min-width: 20px; height: 20px; padding: 0 6px; display: inline-grid; place-items: center;
        border-radius: 999px; background: var(--bg-soft, #eef0f3); }
      @media (max-width: 560px) {
        .store-section { gap: 11px; margin: 24px 0 13px; }
        .store-sec-img { width: 42px; height: 42px; border-radius: 11px; }
        .store-sec-title { font-size: 1.05rem; }

      /* Redemption code — on the checkout success screen + in My Orders. */
      .redeem-box { display: flex; flex-direction: column; align-items: center; gap: 6px; margin: 4px auto 20px; padding: 16px 20px;
        max-width: 360px; border-radius: 14px; border: 1px solid color-mix(in srgb, var(--accent) 40%, transparent); background: color-mix(in srgb, var(--accent) 8%, transparent); }
      .redeem-label { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; color: var(--text-muted); }
      .redeem-code { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 1.4rem; font-weight: 800; letter-spacing: .06em; color: var(--accent); user-select: all; }
