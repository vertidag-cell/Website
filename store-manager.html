<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Store Manager — Arkoris</title>
    <meta name="robots" content="noindex" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/png" href="assets/logo.png?v=2" />
    <link rel="stylesheet" href="styles.css?v=57" />
    <style>
      /* ── Store Manager — a focused admin app on the site's dark/neon-green
         design language. Component vocabulary: fields, switches, segmented
         controls, stat tiles, rows, badges, a right slide-over for editing,
         skeletons and teaching empty states. ── */
      /* z-index scale: sidebar-scrim 40 · drawer 50 · mobile-nav 60 · toast 80 */
      .sm-app { --accent-glow: rgba(43, 255, 158, 0.42); }
      .sm-app { --side-w: 244px; --pad: clamp(18px, 3vw, 34px);
        min-height: 100vh; display: grid; grid-template-columns: var(--side-w) 1fr; background: var(--bg); }

      /* Sidebar */
      .sm-side { position: sticky; top: 0; align-self: start; height: 100vh; display: flex; flex-direction: column;
        background: linear-gradient(180deg, var(--bg-soft), var(--bg)); border-right: 1px solid var(--border); padding: 18px 14px; }
      .sm-brand { display: flex; align-items: center; gap: 10px; padding: 6px 8px 16px; }
      .sm-brand .logo { width: 34px; height: 34px; border-radius: 10px; object-fit: cover; border: 1px solid var(--border-strong); }
      .sm-brand .logo.fb { display: grid; place-items: center; font-weight: 800; color: var(--bg); background: var(--accent); }
      .sm-brand .nm { font-weight: 800; font-size: 14.5px; line-height: 1.1; }
      .sm-brand .sub { font-size: 11px; color: var(--text-dim); }
      .sm-nav { display: flex; flex-direction: column; gap: 2px; margin-top: 4px; }
      .sm-nav button { display: flex; align-items: center; gap: 11px; width: 100%; text-align: left; background: none; border: none;
        color: var(--text-muted); font: inherit; font-weight: 600; font-size: 14px; padding: 9px 11px; border-radius: 10px; cursor: pointer;
        transition: background .15s, color .15s; }
      .sm-nav button:hover { background: var(--card); color: var(--text); }
      .sm-nav button.active { background: var(--accent-tint); color: var(--accent-soft); }
      .sm-nav button .ic { width: 18px; height: 18px; flex: none; }
      .sm-nav button .ic svg { width: 18px; height: 18px; }
      .sm-nav .pip { margin-left: auto; min-width: 18px; height: 18px; padding: 0 5px; border-radius: 999px; background: #f59e0b; color: #1a1205;
        font-size: 11px; font-weight: 800; display: grid; place-items: center; }
      .sm-side-foot { margin-top: auto; padding-top: 12px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 6px; }
      .sm-side-foot a { font-size: 12.5px; color: var(--text-muted); padding: 7px 11px; border-radius: 9px; text-decoration: none; transition: background .15s; }
      .sm-side-foot a:hover { background: var(--card); color: var(--text); }

      /* Main */
      .sm-main { min-width: 0; }
      .sm-topbar { position: sticky; top: 0; z-index: 10; display: flex; align-items: center; gap: 14px; padding: 16px var(--pad);
        background: color-mix(in srgb, var(--bg) 82%, transparent); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); }
      .sm-topbar h1 { margin: 0; font-size: 19px; font-weight: 800; letter-spacing: -0.01em; }
      .sm-topbar .sub { font-size: 12.5px; color: var(--text-muted); margin-top: 1px; }
      .sm-topbar .right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
      .sm-burger { display: none; }
      .sm-content { padding: var(--pad); max-width: 1080px; }

      /* Status pill */
      .pill { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 700; padding: 4px 11px; border-radius: 999px; border: 1px solid var(--border); color: var(--text-muted); }
      .pill::before { content: ""; width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
      .pill.on { color: var(--accent); border-color: color-mix(in srgb, var(--accent) 40%, transparent); background: var(--accent-tint); }
      .pill.off { color: var(--text-dim); }

      /* Section + card */
      .panel { border: 1px solid var(--border); border-radius: var(--radius-lg); background: var(--bg-elev); padding: 22px 24px; margin-bottom: 18px; }
      .panel-h { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 4px; flex-wrap: wrap; }
      .panel-h h2 { margin: 0; font-size: 16px; font-weight: 800; }
      .panel-sub { color: var(--text-muted); font-size: 13px; margin: 0 0 16px; max-width: 70ch; }
      .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
      @media (max-width: 560px) { .grid2 { grid-template-columns: 1fr; } }

      /* Fields */
      .field { display: block; margin-bottom: 14px; }
      .field > .lab { display: block; font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
      .field .hint { display: block; font-size: 12px; color: var(--text-muted); margin-top: 5px; }
      .field .err { display: block; font-size: 12.5px; color: #fda4a4; margin-top: 5px; }
      .inp { width: 100%; padding: 10px 12px; font: inherit; font-size: 14px; color: var(--text);
        background: var(--bg-soft); border: 1px solid var(--border); border-radius: 11px; transition: border-color .15s, box-shadow .15s; }
      .inp::placeholder { color: var(--text-dim); }
      .inp:hover { border-color: var(--border-strong); }
      .inp:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-tint); }
      textarea.inp { resize: vertical; min-height: 76px; line-height: 1.5; }
      select.inp { appearance: none; background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' fill='none' stroke='%239fb4ab' stroke-width='2'><path d='M3 5l4 4 4-4'/></svg>"); background-repeat: no-repeat; background-position: right 12px center; padding-right: 34px; }
      .inp-prefix { position: relative; }
      .inp-prefix > span { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 14px; pointer-events: none; }
      .inp-prefix .inp { padding-left: 26px; }

      /* Toggle switch */
      .sw { display: inline-flex; align-items: center; gap: 10px; cursor: pointer; font-size: 14px; }
      .sw input { position: absolute; opacity: 0; width: 0; height: 0; }
      .sw .track { width: 40px; height: 23px; border-radius: 999px; background: var(--card); border: 1px solid var(--border-strong); position: relative; transition: background .18s, border-color .18s; flex: none; }
      .sw .track::after { content: ""; position: absolute; top: 2px; left: 2px; width: 17px; height: 17px; border-radius: 50%; background: var(--text-muted); transition: transform .18s, background .18s; }
      .sw input:checked + .track { background: var(--accent); border-color: var(--accent); }
      .sw input:checked + .track::after { transform: translateX(17px); background: var(--bg); }
      .sw input:focus-visible + .track { box-shadow: 0 0 0 3px var(--accent-tint); }
      .sw-row { display: flex; align-items: center; justify-content: space-between; gap: 14px; padding: 13px 0; border-bottom: 1px solid var(--border); }
      .sw-row:last-child { border-bottom: none; }
      .sw-row .meta .t { font-weight: 600; font-size: 14px; }
      .sw-row .meta .d { font-size: 12.5px; color: var(--text-muted); margin-top: 1px; }

      /* Segmented control */
      .seg { display: inline-flex; padding: 3px; gap: 3px; background: var(--bg-soft); border: 1px solid var(--border); border-radius: 11px; }
      .seg button { border: none; background: none; color: var(--text-muted); font: inherit; font-weight: 600; font-size: 13.5px; padding: 7px 14px; border-radius: 8px; cursor: pointer; transition: background .15s, color .15s; }
      .seg button.on { background: var(--accent); color: var(--bg); }

      /* Stat tiles */
      .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(168px, 1fr)); gap: 14px; margin-bottom: 18px; }
      .stat { border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg-elev); padding: 16px 18px; position: relative; overflow: hidden; }
      .stat .v { font-size: 26px; font-weight: 900; letter-spacing: -0.02em; line-height: 1.1; }
      .stat .l { font-size: 12.5px; color: var(--text-muted); margin-top: 3px; }
      .stat .ic { position: absolute; top: 14px; right: 14px; color: var(--text-dim); opacity: .7; }
      .stat .ic svg { width: 18px; height: 18px; }
      .stat.flag { border-color: color-mix(in srgb, #f59e0b 55%, transparent); }
      .stat.flag .v, .stat.flag .ic { color: #f9b94a; }

      /* Rows / lists */
      .row { display: flex; align-items: center; gap: 14px; padding: 13px 16px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg-elev); margin-bottom: 9px; transition: border-color .15s; }
      .row:hover { border-color: var(--border-strong); }
      .row .grow { flex: 1; min-width: 0; }
      .row .t { font-weight: 700; font-size: 14.5px; }
      .row .d { font-size: 12.5px; color: var(--text-muted); margin-top: 2px; }

      /* Badges */
      .badge { position: static; top: auto; right: auto; text-transform: none; letter-spacing: normal; display: inline-flex; align-items: center; gap: 5px; font-size: 11.5px; font-weight: 700; padding: 3px 9px; border-radius: 999px; border: 1px solid var(--border); color: var(--text-muted); white-space: nowrap; }
      .badge.ok { color: var(--accent); border-color: color-mix(in srgb, var(--accent) 40%, transparent); background: var(--accent-tint); }
      .badge.warn { color: #f9b94a; border-color: rgba(245,158,11,.4); background: rgba(245,158,11,.08); }
      .badge.info { color: #7cc4ff; border-color: rgba(96,165,250,.4); background: rgba(96,165,250,.08); }
      .badge.dim { color: var(--text-dim); }

      /* Product cards */
      .pgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(248px, 1fr)); gap: 16px; }
      .pcard { border: 1px solid var(--border); border-radius: var(--radius-lg); background: var(--bg-elev); overflow: hidden; display: flex; flex-direction: column; transition: transform .15s, border-color .15s; }
      .pcard:hover { transform: translateY(-2px); border-color: var(--border-strong); }
      .pcard.off { opacity: .55; }
      .pcard .img { width: 100%; aspect-ratio: 16/9; object-fit: cover; background: var(--bg-soft); }
      .pcard .img.fb { display: grid; place-items: center; font-weight: 800; font-size: 28px; color: var(--text-dim); }
      .pcard .body { padding: 13px 14px 14px; display: flex; flex-direction: column; gap: 7px; flex: 1; }
      .pcard .nm { font-weight: 800; font-size: 15px; }
      .pcard .pr { font-weight: 800; font-size: 14px; }
      .pcard .pr .alt { color: var(--text-muted); font-weight: 600; font-size: 12.5px; }
      .pcard .foot { margin-top: auto; display: flex; gap: 6px; padding-top: 8px; }
      .pcard .foot .btn { flex: 1; justify-content: center; padding: 7px; font-size: 13px; }

      /* Slide-over drawer (used instead of centered modals) */
      .scrim { position: fixed; inset: 0; z-index: 40; background: rgba(0,0,0,.55); backdrop-filter: blur(3px); opacity: 0; transition: opacity .2s; }
      .scrim.in { opacity: 1; }
      .drawer { position: fixed; top: 0; right: 0; z-index: 50; width: min(520px, 100%); height: 100vh; display: flex; flex-direction: column;
        background: var(--bg-elev); border-left: 1px solid var(--border-strong); transform: translateX(100%); transition: transform .26s cubic-bezier(.22,.61,.36,1); }
      .drawer.in { transform: none; }
      .drawer-h { display: flex; align-items: center; justify-content: space-between; padding: 18px 22px; border-bottom: 1px solid var(--border); }
      .drawer-h h2 { margin: 0; font-size: 17px; font-weight: 800; }
      .drawer-x { background: none; border: none; color: var(--text-muted); font-size: 20px; line-height: 1; cursor: pointer; padding: 4px; border-radius: 8px; }
      .drawer-x:hover { color: var(--text); background: var(--card); }
      .drawer-b { flex: 1; overflow-y: auto; padding: 22px; }
      .drawer-f { display: flex; gap: 10px; justify-content: flex-end; padding: 16px 22px; border-top: 1px solid var(--border); background: var(--bg-soft); }
      .img-prev { width: 110px; height: 66px; border-radius: 10px; object-fit: cover; border: 1px solid var(--border); margin-top: 8px; }

      /* Filters */
      .chips { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 14px; }
      .chip { padding: 6px 14px; border-radius: 999px; border: 1px solid var(--border); background: var(--bg-soft); color: var(--text-muted); font-size: 13px; font-weight: 600; cursor: pointer; transition: all .15s; }
      .chip:hover { border-color: var(--border-strong); color: var(--text); }
      .chip.on { background: var(--accent); border-color: var(--accent); color: var(--bg); }

      /* Empty + skeleton + toast + muted */
      .empty { text-align: center; padding: 52px 24px; border: 1px dashed var(--border-strong); border-radius: var(--radius-lg); background: var(--bg-elev); }
      .empty .e-ic { width: 54px; height: 54px; margin: 0 auto 16px; display: grid; place-items: center; border-radius: 16px; color: var(--accent); background: var(--accent-tint); }
      .empty .e-ic svg { width: 26px; height: 26px; }
      .empty h3 { margin: 0 0 8px; font-size: 18px; }
      .empty p { color: var(--text-muted); max-width: 42ch; margin: 0 auto 20px; line-height: 1.55; }
      .muted { color: var(--text-muted); }
      .sk { background: linear-gradient(90deg, var(--card), color-mix(in srgb, var(--accent) 7%, var(--card)), var(--card)); background-size: 200% 100%; animation: sh 1.3s infinite; border-radius: var(--radius); }
      @keyframes sh { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
      .toast { position: fixed; left: 50%; bottom: 26px; z-index: 80; transform: translate(-50%, 16px); opacity: 0; background: var(--bg-elev); color: var(--text);
        border: 1px solid var(--border-strong); border-radius: 12px; padding: 12px 18px; font-weight: 700; font-size: 14px; box-shadow: 0 18px 50px rgba(0,0,0,.6); transition: opacity .22s, transform .22s; }
      .toast.in { opacity: 1; transform: translate(-50%, 0); }
      .toast.err { border-color: rgba(239,68,68,.55); }
      .toast .dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: var(--accent); margin-right: 8px; }
      .toast.err .dot { background: #ef4444; }

      .state-full { min-height: 70vh; display: grid; place-items: center; text-align: center; padding: 24px; }
      .state-full .e-ic { width: 60px; height: 60px; margin: 0 auto 18px; display: grid; place-items: center; border-radius: 18px; color: var(--accent); background: var(--accent-tint); }
      .state-full h2 { margin: 0 0 10px; font-size: 24px; }
      .state-full p { color: var(--text-muted); max-width: 44ch; margin: 0 auto 22px; }

      /* Responsive: collapse the sidebar into a slide-in drawer */
      @media (max-width: 860px) {
        .sm-app { grid-template-columns: 1fr; }
        .sm-side { position: fixed; left: 0; top: 0; z-index: 60; width: 260px; transform: translateX(-100%); transition: transform .24s; box-shadow: 0 20px 60px rgba(0,0,0,.6); }
        .sm-app.nav-open .sm-side { transform: none; }
        .sm-burger { display: inline-grid; place-items: center; width: 38px; height: 38px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg-soft); color: var(--text); cursor: pointer; }
        .sm-nav-scrim { position: fixed; inset: 0; z-index: 55; background: rgba(0,0,0,.5); }
      }
      /* ── WOW layer: depth, glow, motion, data viz ── */
      .sm-main { background:
        radial-gradient(960px 440px at 80% -140px, color-mix(in srgb, var(--accent) 13%, transparent), transparent 68%),
        radial-gradient(720px 380px at 6% -40px, color-mix(in srgb, var(--accent-2) 9%, transparent), transparent 62%); }
      .btn-primary { box-shadow: 0 8px 24px -8px var(--accent-glow); }
      .btn-primary:hover { box-shadow: 0 12px 32px -8px var(--accent-glow); transform: translateY(-1px); }
      .pill.on { box-shadow: 0 0 16px -4px var(--accent-glow); }

      @keyframes rise { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }
      .reveal { animation: rise .5s cubic-bezier(.22,.61,.36,1) both; }

      .ov-grid { display: grid; grid-template-columns: 1.7fr 1fr; gap: 16px; margin-bottom: 16px; }
      .ov-mini { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; align-content: start; }
      .ov-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
      @media (max-width: 880px) { .ov-grid, .ov-cols { grid-template-columns: 1fr; } }

      /* Hero revenue card with chart */
      .hero-rev { position: relative; overflow: hidden; border: 1px solid var(--border-strong); border-radius: var(--radius-lg);
        background: linear-gradient(180deg, color-mix(in srgb, var(--accent) 9%, var(--bg-elev)), var(--bg-elev)); padding: 22px 24px 0; display: flex; flex-direction: column; min-height: 290px; }
      .hero-rev .cap { font-size: 12.5px; color: var(--text-muted); font-weight: 700; letter-spacing: .03em; text-transform: uppercase; }
      .hero-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
      .range-toggle { display: inline-flex; gap: 2px; border: 1px solid var(--border); border-radius: 999px; padding: 2px; flex: none; }
      .range-btn { border: none; background: none; color: var(--text-muted); font: inherit; font-weight: 700; font-size: 12px; padding: 4px 12px; border-radius: 999px; cursor: pointer; }
      .range-btn.on { background: var(--accent-tint); color: var(--accent); }
      .hero-rev .big { font-size: clamp(34px, 5vw, 46px); font-weight: 900; letter-spacing: -0.03em; line-height: 1.04; margin-top: 6px; }
      .hero-rev .trend { display: inline-flex; align-items: center; gap: 5px; font-size: 12.5px; font-weight: 800; padding: 3px 11px; border-radius: 999px; margin-top: 10px; }
      .hero-rev .trend.up { color: var(--accent); background: var(--accent-tint); }
      .hero-rev .trend.down { color: #fda4a4; background: rgba(239,68,68,.1); }
      .hero-rev .trend.flat { color: var(--text-muted); background: var(--card); }
      .chart { margin: 16px -24px 0; }
      .chart svg { display: block; width: 100%; height: 156px; }
      .hero-sub { display: flex; gap: 26px; margin-top: auto; padding: 15px 0; border-top: 1px solid var(--border); }
      .hero-sub .v { font-weight: 800; font-size: 16px; }
      .hero-sub .l { font-size: 11.5px; color: var(--text-muted); }

      /* glowing mini stat */
      .gstat { position: relative; overflow: hidden; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg-elev); padding: 16px 17px; }
      .gstat::before { content: ""; position: absolute; right: -34px; top: -34px; width: 94px; height: 94px; border-radius: 50%; background: radial-gradient(circle, var(--accent-tint), transparent 70%); pointer-events: none; }
      .gstat .gi { position: absolute; top: 14px; right: 15px; color: var(--accent); opacity: .8; }
      .gstat .gi svg { width: 17px; height: 17px; }
      .gstat .v { font-size: 25px; font-weight: 900; letter-spacing: -0.02em; }
      .gstat .l { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
      .gstat.flag { border-color: color-mix(in srgb, #f59e0b 55%, transparent); }
      .gstat.flag::before { background: radial-gradient(circle, rgba(245,158,11,.2), transparent 70%); }
      .gstat.flag .v, .gstat.flag .gi { color: #f9b94a; }

      /* needs-delivery alert */
      .alert { display: flex; align-items: center; gap: 14px; padding: 16px 18px; border-radius: var(--radius); margin-bottom: 16px;
        border: 1px solid color-mix(in srgb, #f59e0b 50%, transparent); background: linear-gradient(90deg, rgba(245,158,11,.1), transparent); }
      .alert .ai { width: 40px; height: 40px; border-radius: 11px; display: grid; place-items: center; color: #f9b94a; background: rgba(245,158,11,.14); flex: none; }
      .alert .grow { flex: 1; } .alert .t { font-weight: 800; } .alert .d { font-size: 13px; color: var(--text-muted); }

      /* top products bars */
      .topp { display: flex; flex-direction: column; gap: 13px; }
      .topp .hd { display: flex; justify-content: space-between; gap: 8px; font-size: 13.5px; margin-bottom: 6px; }
      .topp .hd .nm { font-weight: 600; } .topp .hd .qv { color: var(--text-muted); font-weight: 700; }
      .topp .bar { height: 8px; border-radius: 999px; background: var(--card); overflow: hidden; }
      .topp .bar i { display: block; height: 100%; border-radius: inherit; background: linear-gradient(90deg, var(--accent-deep), var(--accent)); box-shadow: 0 0 12px var(--accent-glow); transition: width .6s cubic-bezier(.22,.61,.36,1); }

      .empty.sm { padding: 26px 16px; } .empty.sm .e-ic { width: 40px; height: 40px; } .empty.sm h3 { font-size: 15px; }

      /* Variant / tier manager (inside product editor) */
      .var-mgr { display: flex; flex-direction: column; gap: 8px; }
      .var-row { display: flex; align-items: center; gap: 10px; padding: 9px 11px; border: 1px solid var(--border); border-radius: 10px; background: var(--bg-elev); }
      .var-row .t { font-weight: 700; font-size: 13.5px; } .var-row .d { font-size: 12px; color: var(--text-muted); margin-top: 1px; }
      .var-add { margin-top: 4px; padding: 11px; border: 1px dashed var(--border-strong); border-radius: 10px; display: flex; flex-direction: column; gap: 8px; }
      .var-add-row { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 8px; }
      .var-add .inp { padding: 8px 10px; font-size: 13px; }

      /* New-store onboarding checklist */
      .onb-list { display: flex; flex-direction: column; gap: 10px; }
      .onb-step { display: flex; align-items: center; gap: 13px; padding: 13px 15px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg-elev); }
      .onb-step.done { opacity: .72; }
