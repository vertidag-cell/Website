<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>XP Leaderboard — Arkoris</title>
    <meta name="description" content="Live XP leaderboard for your Discord server, powered by Arkoris." />
    <meta name="robots" content="noindex" />
    <meta property="og:title" content="XP Leaderboard — Arkoris" />
    <meta property="og:type" content="website" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/png" href="assets/logo.png" />
    <link rel="stylesheet" href="styles.css?v=46" />
    <style>
      /* ── XP leaderboard page — self-contained, inherits the dark SaaS theme
         variables from styles.css; --accent is overridden per-guild at runtime
         so each server's page is tinted to its own brand colour. ── */
      :root { --accent: var(--red, #2bff9e); }
      .xplb-wrap { max-width: 880px; margin: 0 auto; padding: 28px 20px 80px; }

      .xplb-hero {
        position: relative; text-align: center; padding: 40px 24px 30px;
        border: 1px solid var(--border); border-radius: var(--radius-lg, 20px);
        background:
          radial-gradient(600px 240px at 50% -40px, color-mix(in srgb, var(--accent) 22%, transparent), transparent 70%),
          var(--card, rgba(255,255,255,0.06));
        overflow: hidden; margin-bottom: 26px;
      }
      .xplb-hero::after {
        content: ""; position: absolute; inset: 0; pointer-events: none;
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
        border-radius: inherit;
      }
      .xplb-badge {
        display: inline-flex; align-items: center; gap: 7px; font-size: 12px; font-weight: 700;
        letter-spacing: .08em; text-transform: uppercase; color: var(--accent);
        border: 1px solid color-mix(in srgb, var(--accent) 45%, transparent);
        background: color-mix(in srgb, var(--accent) 12%, transparent);
        padding: 5px 12px; border-radius: 999px; margin-bottom: 16px;
      }
      .xplb-logo {
        width: 76px; height: 76px; border-radius: 20px; object-fit: cover; margin: 0 auto 14px;
        display: block; border: 1px solid var(--border-strong, rgba(255,255,255,0.16));
        box-shadow: 0 10px 40px color-mix(in srgb, var(--accent) 30%, transparent);
      }
      .xplb-title { font-size: clamp(26px, 5vw, 40px); font-weight: 900; letter-spacing: -0.02em; margin: 0 0 6px; }
      .xplb-sub { color: var(--text-muted, #a1a1aa); font-size: 15px; margin: 0; }

      /* Podium (top 3) */
      .xplb-podium { display: grid; grid-template-columns: 1fr 1.15fr 1fr; gap: 12px; align-items: end; margin-bottom: 22px; }
      .pod { text-align: center; border: 1px solid var(--border); border-radius: 16px; padding: 18px 10px 16px;
             background: var(--card, rgba(255,255,255,0.06)); position: relative; }
      .pod.gold   { border-color: color-mix(in srgb, #ffd66b 55%, transparent); background: linear-gradient(180deg, rgba(255,196,0,0.14), rgba(255,255,255,0.05)); transform: translateY(-10px); }
      .pod.silver { border-color: rgba(220,225,235,0.4); }
      .pod.bronze { border-color: rgba(214,158,110,0.45); }
      .pod-medal { font-size: 26px; line-height: 1; margin-bottom: 8px; }
      .pod-av { width: 64px; height: 64px; border-radius: 50%; object-fit: cover; margin: 0 auto 10px; display: block;
                border: 2px solid var(--border-strong, rgba(255,255,255,0.18)); background: #15151c; }
      .pod.gold .pod-av { width: 76px; height: 76px; border-color: #ffd66b; box-shadow: 0 8px 30px rgba(255,196,0,0.35); }
      .pod-name { font-weight: 700; font-size: 14px; margin: 0 0 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .pod-lvl { font-size: 12px; color: var(--accent); font-weight: 700; }
      .pod-xp { font-size: 12px; color: var(--text-muted, #a1a1aa); margin-top: 2px; }

      /* Ranked rows */
      .xplb-list { display: flex; flex-direction: column; gap: 8px; }
      .xprow { display: grid; grid-template-columns: 40px 44px 1fr auto; align-items: center; gap: 14px;
               padding: 11px 16px; border: 1px solid var(--border); border-radius: 14px;
               background: var(--card, rgba(255,255,255,0.055)); transition: background .15s, border-color .15s, transform .15s; }
      .xprow:hover { background: var(--card-hover, rgba(255,255,255,0.095)); border-color: var(--border-strong, rgba(255,255,255,0.16)); transform: translateX(2px); }
      .xprow-rank { font-weight: 800; font-size: 16px; color: var(--text-dim, #71717a); text-align: center; }
      .xprow-av { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; background: #15151c;
                  border: 1px solid var(--border); }
      .xprow-main { min-width: 0; }
      .xprow-name { font-weight: 700; font-size: 15px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .xprow-bar { height: 5px; border-radius: 999px; background: rgba(255,255,255,0.08); margin-top: 7px; overflow: hidden; }
      .xprow-bar > i { display: block; height: 100%; border-radius: inherit;
                       background: linear-gradient(90deg, var(--accent), color-mix(in srgb, var(--accent) 50%, #fff)); }
      .xprow-stats { text-align: right; white-space: nowrap; }
      .xprow-lvl { font-weight: 800; font-size: 15px; }
      .xprow-xp { font-size: 12px; color: var(--text-muted, #a1a1aa); }
      .xprow-meta { font-size: 11.5px; color: var(--text-dim, #71717a); margin-top: 3px; }
      .pod-meta { font-size: 11px; color: var(--text-dim, #71717a); margin-top: 5px; }

      /* Initial-letter fallback for a broken/missing avatar or logo (the CSP
         blocks inline onerror, so this is swapped in by JS). Sits on top of the
         size/shape from .xplb-logo / .pod-av / .xprow-av. */
      .xplb-avfb { display: flex; align-items: center; justify-content: center; font-weight: 800;
                   color: var(--text); background: color-mix(in srgb, var(--accent) 22%, rgba(255,255,255,0.06)); }
      .xplb-logo.xplb-avfb { font-size: 30px; }
      .pod-av.xplb-avfb { font-size: 24px; }
      .xprow-av.xplb-avfb { font-size: 17px; }

      /* Server-totals strip in the hero */
      .xplb-totals { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 16px; }
      .xplb-totals span { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 600;
        color: var(--text-muted, #a1a1aa); background: var(--card, rgba(255,255,255,0.05));
        border: 1px solid var(--border, rgba(255,255,255,0.1)); padding: 6px 13px; border-radius: 999px; }

      .xplb-state { text-align: center; padding: 60px 24px; border: 1px dashed var(--border); border-radius: var(--radius-lg, 20px);
                    background: var(--card, rgba(255,255,255,0.04)); }
      .xplb-state h2 { font-size: 22px; margin: 0 0 10px; }
      .xplb-state p { color: var(--text-muted, #a1a1aa); max-width: 460px; margin: 0 auto 20px; }
      .xplb-foot { text-align: center; color: var(--text-dim, #71717a); font-size: 13px; margin-top: 26px; }
      .xplb-foot a { color: var(--text-muted, #a1a1aa); }
      .skel { background: linear-gradient(90deg, rgba(255,255,255,0.05), rgba(255,255,255,0.1), rgba(255,255,255,0.05));
              background-size: 200% 100%; animation: shimmer 1.3s infinite; border-radius: 14px; height: 64px; }
      @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
      @media (max-width: 560px) {
        .xplb-podium { grid-template-columns: 1fr; }
        .pod.gold { transform: none; order: -1; }
      }
    </style>
  </head>
  <body>
    <header class="navbar">
      <div class="container nav-inner">
        <a class="brand" href="index.html">
          <span class="brand-mark" aria-hidden="true"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M12 2L20 5v7c0 4.5-3.5 8.5-8 9-4.5-.5-8-4.5-8-9V5l8-3z" fill="rgba(255,255,255,0.16)" stroke="rgba(255,255,255,0.55)" stroke-width="0.9"/><path d="M13.2 6.5l-4.3 7h3l-1 4 4.3-7h-3l1-4z" fill="#fff"/></svg></span>
          <span class="brand-text"><span class="name">Arkoris</span><span class="sub">Discord Automation · ARK</span></span>
        </a>
        <div class="nav-cta">
          <a class="btn btn-ghost nav-hide-sm" data-link="inviteBot" href="#">Invite Bot</a>
          <a class="btn btn-primary" data-link="subscribe" href="pricing.html">Get Premium</a>
        </div>
      </div>
    </header>

    <main>
      <div class="xplb-wrap">
        <div id="xplb-root">
          <div class="skel" style="height:180px;margin-bottom:24px"></div>
          <div class="skel" style="height:64px;margin-bottom:8px"></div>
          <div class="skel" style="height:64px;margin-bottom:8px"></div>
          <div class="skel" style="height:64px"></div>
        </div>
        <p class="xplb-foot">Powered by <a href="index.html">Arkoris</a> · Live XP rankings for your Discord server</p>
      </div>
    </main>

    <script src="config.js"></script>
    <script src="xp-leaderboard.js"></script>
  </body>
</html>
