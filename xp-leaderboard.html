<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>XP Leaderboard — Quick's ARK Bot</title>
    <meta name="description" content="Live XP leaderboard for your Discord server, powered by Quick's ARK Bot." />
    <meta name="robots" content="noindex" />
    <meta property="og:title" content="XP Leaderboard — Quick's ARK Bot" />
    <meta property="og:type" content="website" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/png" href="assets/logo.png" />
    <link rel="stylesheet" href="styles.css" />
    <style>
      /* ── XP leaderboard page — self-contained, inherits the dark SaaS theme
         variables from styles.css; --accent is overridden per-guild at runtime
         so each server's page is tinted to its own brand colour. ── */
      :root { --accent: var(--red, #ef233c); }
      .xplb-wrap { max-width: 880px; margin: 0 auto; padding: 28px 20px 80px; }

      .xplb-hero {
        position: relative; text-align: center; padding: 40px 24px 30px;
        border: 1px solid var(--border); border-radius: var(--radius-lg, 20px);
        background:
          radial-gradient(600px 240px at 50% -40px, color-mix(in srgb, var(--accent) 22%, transparent), transparent 70%),
          var(--card, rgba(255,255,255,0.06));
        overflow: hidden; margin-bottom: 26px;
      }
      .xplb-hero::after {
        content: ""; position: absolute; inset: 0; pointer-events: none;
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
        border-radius: inherit;
      }
      .xplb-badge {
        display: inline-flex; align-items: center; gap: 7px; font-size: 12px; font-weight: 700;
        letter-spacing: .08em; text-transform: uppercase; color: var(--accent);
        border: 1px solid color-mix(in srgb, var(--accent) 45%, transparent);
        background: color-mix(in srgb, var(--accent) 12%, transparent);
        padding: 5px 12px; border-radius: 999px; margin-bottom: 16px;
      }
      .xplb-logo {
        width: 76px; height: 76px; border-radius: 20px; object-fit: cover; margin: 0 auto 14px;
        display: block; border: 1px solid var(--border-strong, rgba(255,255,255,0.16));
        box-shadow: 0 10px 40px color-mix(in srgb, var(--accent) 30%, transparent);
      }
      .xplb-title { font-size: clamp(26px, 5vw, 40px); font-weight: 900; letter-spacing: -0.02em; margin: 0 0 6px; }
      .xplb-sub { color: var(--text-muted, #a1a1aa); font-size: 15px; margin: 0; }

      /* Podium (top 3) */
      .xplb-podium { display: grid; grid-template-columns: 1fr 1.15fr 1fr; gap: 12px; align-items: end; margin-bottom: 22px; }
      .pod { text-align: center; border: 1px solid var(--border); border-radius: 16px; padding: 18px 10px 16px;
             background: var(--card, rgba(255,255,255,0.06)); position: relative; }
      .pod.gold   { border-color: color-mix(in srgb, #ffd66b 55%, transparent); background: linear-gradient(180deg, rgba(255,196,0,0.14), rgba(255,255,255,0.05)); transform: translateY(-10px); }
      .pod.silver { border-color: rgba(220,225,235,0.4); }
      .pod.bronze { border-color: rgba(214,158,110,0.45); }
      .pod-medal { font-size: 26px; line-height: 1; margin-bottom: 8px; }
      .pod-av { width: 64px; height: 64px; border-radius: 50%; object-fit: cover; margin: 0 auto 10px; display: block;
                border: 2px solid var(--border-strong, rgba(255,255,255,0.18)); background: #15151c; }
      .pod.gold .pod-av { width: 76px; height: 76px; border-color: #ffd66b; box-shadow: 0 8px 30px rgba(255,196,0,0.35); }
      .pod-name { font-weight: 700; font-size: 14px; margin: 0 0 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .pod-lvl { font-size: 12px; color: var(--accent); font-weight: 700; }
      .pod-xp { font-size: 12px; color: var(--text-muted, #a1a1aa); margin-top: 2px; }

      /* Ranked rows */
      .xplb-list { display: flex; flex-direction: column; gap: 8px; }
      .xprow { display: grid; grid-template-columns: 40px 44px 1fr auto; align-items: center; gap: 14px;
               padding: 11px 16px; border: 1px solid var(--border); border-radius: 14px;
               background: var(--card, rgba(255,255,255,0.055)); transition: background .15s, border-color .15s, transform .15s; }
      .xprow:hover { background: var(--card-hover, rgba(255,255,255,0.095)); border-color: var(--border-strong, rgba(255,255,255,0.16)); transform: translateX(2px); }
      .xprow-rank { font-weight: 800; font-size: 16px; color: var(--text-dim, #71717a); text-align: center; }
      .xprow-av { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; background: #15151c;
                  border: 1px solid var(--border); }
      .xprow-main { min-width: 0; }
      .xprow-name { font-weight: 700; font-size: 15px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .xprow-bar { height: 5px; border-radius: 999px; background: rgba(255,255,255,0.08); margin-top: 7px; overflow: hidden; }
      .xprow-bar > i { display: block; height: 100%; border-radius: inherit;
                       background: linear-gradient(90deg, var(--accent), color-mix(in srgb, var(--accent) 50%, #fff)); }
      .xprow-stats { text-align: right; white-space: nowrap; }
      .xprow-lvl { font-weight: 800; font-size: 15px; }
      .xprow-xp { font-size: 12px; color: var(--text-muted, #a1a1aa); }

      .xplb-state { text-align: center; padding: 60px 24px; border: 1px dashed var(--border); border-radius: var(--radius-lg, 20px);
                    background: var(--card, rgba(255,255,255,0.04)); }
      .xplb-state h2 { font-size: 22px; margin: 0 0 10px; }
      .xplb-state p { color: var(--text-muted, #a1a1aa); max-width: 460px; margin: 0 auto 20px; }
      .xplb-foot { text-align: center; color: var(--text-dim, #71717a); font-size: 13px; margin-top: 26px; }
      .xplb-foot a { color: var(--text-muted, #a1a1aa); }
      .skel { background: linear-gradient(90deg, rgba(255,255,255,0.05), rgba(255,255,255,0.1), rgba(255,255,255,0.05));
              background-size: 200% 100%; animation: shimmer 1.3s infinite; border-radius: 14px; height: 64px; }
      @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
      @media (max-width: 560px) {
        .xplb-podium { grid-template-columns: 1fr; }
        .pod.gold { transform: none; order: -1; }
      }
    </style>
  </head>
  <body>
    <header class="navbar">
      <div class="container nav-inner">
        <a class="brand" href="index.html">
          <span class="brand-mark" aria-hidden="true"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M12 2L20 5v7c0 4.5-3.5 8.5-8 9-4.5-.5-8-4.5-8-9V5l8-3z" fill="rgba(255,255,255,0.16)" stroke="rgba(255,255,255,0.55)" stroke-width="0.9"/><path d="M13.2 6.5l-4.3 7h3l-1 4 4.3-7h-3l1-4z" fill="#fff"/></svg></span>
          <span class="brand-text"><span class="name">Quick's ARK Bot</span><span class="sub">Discord Automation · ARK</span></span>
        </a>
        <div class="nav-cta">
          <a class="btn btn-ghost nav-hide-sm" data-link="inviteBot" href="#">Invite Bot</a>
          <a class="btn btn-primary" data-link="subscribe" href="pricing.html">Get Premium</a>
        </div>
      </div>
    </header>

    <main>
      <div class="xplb-wrap">
        <div id="xplb-root">
          <div class="skel" style="height:180px;margin-bottom:24px"></div>
          <div class="skel" style="height:64px;margin-bottom:8px"></div>
          <div class="skel" style="height:64px;margin-bottom:8px"></div>
          <div class="skel" style="height:64px"></div>
        </div>
        <p class="xplb-foot">Powered by <a href="index.html">Quick's ARK Bot</a> · Live XP rankings for your Discord server</p>
      </div>
    </main>

    <script src="config.js"></script>
    <script>
      (function () {
        var cfg = (window.SITE_CONFIG || {});
        var links = cfg.links || {};
        // Wire the header CTAs from config (this page doesn't load script.js).
        document.querySelectorAll('[data-link]').forEach(function (a) {
          var v = links[a.getAttribute('data-link')];
          if (v) a.setAttribute('href', v);
        });

        var root = document.getElementById('xplb-root');
        var params = new URLSearchParams(location.search);
        var guildId = (params.get('guild') || params.get('g') || '').trim();

        function esc(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
          return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]; }); }
        function fmt(n) { return (Number(n) || 0).toLocaleString(); }
        function avatarOr(url, name) {
          if (url) return '<img class="' + (arguments[2] || 'xprow-av') + '" src="' + esc(url) + '" alt="" loading="lazy" onerror="this.style.visibility=\'hidden\'">';
          var letter = esc((name || '?').charAt(0).toUpperCase());
          return '<div class="' + (arguments[2] || 'xprow-av') + '" style="display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--text-muted)">' + letter + '</div>';
        }
        function state(html) { root.innerHTML = '<div class="xplb-state">' + html + '</div>'; }

        if (!guildId || !/^\d{5,25}$/.test(guildId)) {
          state('<h2>No server selected</h2><p>This page needs a server link. Open it from your Discord server with <code>/leaderboard</code> → <b>View on the web</b>.</p><a class="btn btn-primary" href="index.html">Back to site</a>');
          return;
        }

        fetch('/api/dashboard/xp/leaderboard?guild=' + encodeURIComponent(guildId) + '&limit=15', { headers: { Accept: 'application/json' } })
          .then(function (r) { return r.ok ? r.json() : r.json().catch(function () { return { error: 'http_' + r.status }; }); })
          .then(function (data) {
            if (!data || data.error) {
              state('<h2>Leaderboard unavailable</h2><p>We couldn\'t load this server\'s leaderboard right now. Please try again in a moment.</p><a class="btn btn-outline" href="index.html">Back to site</a>');
              return;
            }
            var g = data.guild || {};
            if (g.color) document.documentElement.style.setProperty('--accent', g.color);
            var gname = g.guildName || g.brandName || 'This server';
            document.title = gname + ' — XP Leaderboard';

            if (data.premium === false) {
              state(
                '<div class="xplb-badge">✨ Premium feature</div>' +
                '<h2>' + esc(gname) + '\'s web leaderboard is locked</h2>' +
                '<p>The shareable web XP leaderboard is part of <b>Premium</b>. The in-Discord <code>/leaderboard</code> is always free — upgrade to publish it on the web.</p>' +
                '<a class="btn btn-primary" href="' + esc(links.subscribe || 'pricing.html') + '">See Premium</a>'
              );
              return;
            }

            var board = data.leaderboard || [];
            if (!board.length) {
              state('<div class="xplb-badge">' + esc(gname) + '</div><h2>No XP yet</h2><p>No one has earned XP on this server yet. Start chatting in Discord to climb the board!</p><a class="btn btn-outline" href="index.html">Back to site</a>');
              return;
            }

            var top = board.slice(0, 3);
            var rest = board.slice(3);
            var maxXp = board[0].xp || 1;
            var logo = g.logo || g.guildIcon;

            var html = '';
            html += '<div class="xplb-hero">';
            html += '<div class="xplb-badge">🏆 XP Leaderboard</div>';
            if (logo) html += '<img class="xplb-logo" src="' + esc(logo) + '" alt="" onerror="this.style.display=\'none\'">';
            html += '<h1 class="xplb-title">' + esc(gname) + '</h1>';
            html += '<p class="xplb-sub">Top ' + board.length + ' members by XP · updated just now</p>';
            html += '</div>';

            // Podium — order silver / gold / bronze for the classic stage look.
            var podClass = ['gold', 'silver', 'bronze'];
            var podMedal = ['🥇', '🥈', '🥉'];
            var podOrder = top.length >= 3 ? [1, 0, 2] : top.map(function (_, i) { return i; });
            html += '<div class="xplb-podium">';
            podOrder.forEach(function (idx) {
              var p = top[idx]; if (!p) return;
              html += '<div class="pod ' + podClass[idx] + '">' +
                '<div class="pod-medal">' + podMedal[idx] + '</div>' +
                avatarOr(p.avatar, p.name, 'pod-av') +
                '<p class="pod-name" title="' + esc(p.name) + '">' + esc(p.name) + '</p>' +
                '<div class="pod-lvl">Level ' + fmt(p.level) + '</div>' +
                '<div class="pod-xp">' + fmt(p.xp) + ' XP</div>' +
              '</div>';
            });
            html += '</div>';

            if (rest.length) {
              html += '<div class="xplb-list">';
              rest.forEach(function (p) {
                var pct = Math.max(4, Math.round((p.xp / maxXp) * 100));
                html += '<div class="xprow">' +
                  '<div class="xprow-rank">' + p.rank + '</div>' +
                  avatarOr(p.avatar, p.name, 'xprow-av') +
                  '<div class="xprow-main"><div class="xprow-name" title="' + esc(p.name) + '">' + esc(p.name) + '</div>' +
                    '<div class="xprow-bar"><i style="width:' + pct + '%"></i></div></div>' +
                  '<div class="xprow-stats"><div class="xprow-lvl">Lv ' + fmt(p.level) + '</div>' +
                    '<div class="xprow-xp">' + fmt(p.xp) + ' XP</div></div>' +
                '</div>';
              });
              html += '</div>';
            }

            root.innerHTML = html;
          })
          .catch(function () {
            state('<h2>Couldn\'t reach the server</h2><p>The leaderboard service didn\'t respond. Please try again shortly.</p><a class="btn btn-outline" href="index.html">Back to site</a>');
          });
      })();
    </script>
  </body>
</html>
